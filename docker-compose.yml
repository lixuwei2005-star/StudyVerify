services:
  postgres:
    # Pinned: pgvector image extends the official Postgres image. A floating
    # `pg16` tag could pick up a new pgvector release and silently change
    # extension behavior between dev machines and CI.
    image: pgvector/pgvector:0.8.2-pg16
    container_name: studyverify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-studyverify}
      POSTGRES_USER: ${POSTGRES_USER:-studyverify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-studyverify} -d ${POSTGRES_DB:-studyverify}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: studyverify-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  api:
    image: studyverify-api:dev
    pull_policy: never  # never try to pull from registry; image must
                        # be built locally first via `make docker-build`
                        # or `make compose-up-rebuild`
    container_name: studyverify-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database URL uses the compose service name 'postgres' as
      # hostname, NOT localhost. backend/.env's DATABASE_URL is
      # ignored when running under compose because this var takes
      # precedence in the container's environment.
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"

      # Empty default — base stack (postgres/redis/health endpoints)
      # starts without it. /api/v1/solve will 502 if unset; live LLM
      # verification requires this var.
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      DEEPSEEK_REASONING_EFFORT: ${DEEPSEEK_REASONING_EFFORT:-none}

      # Empty default — RAG_ENABLED=false short-circuits embed/retrieve so the
      # API can boot without an OpenAI key. alembic upgrade head must NOT
      # require this var (Step 6.2 spec).
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      RAG_ENABLED: ${RAG_ENABLED:-true}
      RAG_TOP_K: ${RAG_TOP_K:-3}
      RAG_MIN_SIMILARITY: ${RAG_MIN_SIMILARITY:-0.7}

      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENV: ${ENV:-development}

      SANDBOX_TIMEOUT_SECONDS: ${SANDBOX_TIMEOUT_SECONDS:-5}
      SANDBOX_MEMORY_MB: ${SANDBOX_MEMORY_MB:-128}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind host /tmp so DockerCodeRunner's tempfiles
      # (/sandbox/code.py + input.json) are visible to the host
      # docker daemon when sibling sandbox containers mount them.
      # Without this, the daemon resolves the path on host FS,
      # finds nothing, and silently creates an empty directory.
      # See Step 4.3 end-to-end smoke for the diagnosis.
      - /tmp:/tmp
    group_add:
      - "0"  # root group — grants access to /var/run/docker.sock (gid=0, mode=660)
    ports:
      # Bind to loopback only so the FastAPI container is reachable solely via
      # the same-host Nginx reverse proxy (Baota panel) on 127.0.0.1:8000.
      # Defense-in-depth: even if a future cloud-firewall change opens 8000,
      # the container itself never accepts connections from non-loopback
      # interfaces. Local dev (compose up on Mac) hits localhost:8000 which
      # resolves to 127.0.0.1, so dev workflow is unchanged.
      - "127.0.0.1:${API_PORT:-8000}:8000"
    command: >
      sh -c "alembic upgrade head &&
             exec uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request, sys;
          r = urllib.request.urlopen("http://localhost:8000/health", timeout=2);
          sys.exit(0 if r.status == 200 else 1)
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres-data:
    name: studyverify-postgres-data
  redis-data:
    name: studyverify-redis-data
